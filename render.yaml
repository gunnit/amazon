# Render Blueprint for Inthezon Platform
# Deploy: https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: inthezon-api
    runtime: python
    region: frankfurt
    plan: free
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: PYTHON_VERSION
        value: "3.11.11"
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: "false"
      - key: DATABASE_URL
        fromDatabase:
          name: inthezon-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AMAZON_SP_CLIENT_ID
        sync: false
      - key: AMAZON_SP_CLIENT_SECRET
        sync: false
      - key: AMAZON_ADS_CLIENT_ID
        sync: false
      - key: AMAZON_ADS_CLIENT_SECRET
        sync: false

  # Frontend Static Site
  - type: web
    name: inthezon-frontend
    runtime: static
    buildCommand: |
      cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

databases:
  # PostgreSQL Database
  - name: inthezon-db
    region: frankfurt
    plan: free
    databaseName: inthezon
    user: inthezon
    ipAllowList: []
