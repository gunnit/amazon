# Render Blueprint for Inthezon Platform
# Deploy: https://render.com/docs/blueprint-spec

services:
  # Backend API Service
  - type: web
    name: inthezon-api
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && alembic upgrade head && uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inthezon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: inthezon-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: ENCRYPTION_KEY
        generateValue: true
      - key: CORS_ORIGINS
        sync: false
      - key: SENDGRID_API_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AMAZON_SP_CLIENT_ID
        sync: false
      - key: AMAZON_SP_CLIENT_SECRET
        sync: false
      - key: AMAZON_ADS_CLIENT_ID
        sync: false
      - key: AMAZON_ADS_CLIENT_SECRET
        sync: false

  # Celery Worker Service
  - type: worker
    name: inthezon-worker
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && celery -A workers.celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inthezon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: inthezon-redis
          type: redis
          property: connectionString
      - key: SECRET_KEY
        fromService:
          name: inthezon-api
          envVarKey: SECRET_KEY
      - key: ENCRYPTION_KEY
        fromService:
          name: inthezon-api
          envVarKey: ENCRYPTION_KEY
      - key: SENDGRID_API_KEY
        sync: false
      - key: S3_BUCKET_NAME
        sync: false
      - key: AWS_ACCESS_KEY_ID
        sync: false
      - key: AWS_SECRET_ACCESS_KEY
        sync: false
      - key: AMAZON_SP_CLIENT_ID
        sync: false
      - key: AMAZON_SP_CLIENT_SECRET
        sync: false

  # Celery Beat Scheduler
  - type: worker
    name: inthezon-scheduler
    runtime: python
    region: frankfurt
    plan: starter
    buildCommand: |
      cd backend && pip install -r requirements.txt
    startCommand: |
      cd backend && celery -A workers.celery_app beat --loglevel=info
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: inthezon-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          name: inthezon-redis
          type: redis
          property: connectionString

  # Frontend Static Site
  - type: web
    name: inthezon-frontend
    runtime: static
    region: frankfurt
    buildCommand: |
      cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    headers:
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: X-XSS-Protection
        value: "1; mode=block"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false

  # Redis Cache & Message Broker
  - type: redis
    name: inthezon-redis
    region: frankfurt
    plan: starter
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

databases:
  # PostgreSQL Database
  - name: inthezon-db
    region: frankfurt
    plan: starter
    databaseName: inthezon
    user: inthezon
    ipAllowList: []
